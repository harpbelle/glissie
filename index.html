        <h1>Glissie: Pedal Harp Glissando Simulator</h1>
        <p>
          Glissie is a free, interactive pedal harp glissando simulator. Set the
          seven pedals (D, C, B on the left foot; E, F, G, A on the right foot)
          to any position, choose from over 500 presets, and hear a realistic
          glissando played back using sampled concert harp audio. Built for
          harpists, harp teachers, students, composers, or anyone curious how
          pedal settings translate into playable scales on a concert pedal harp.
