        <h1>Glissie: Pedal Harp Simulator</h1>
        <p>
          Glissie is a free, interactive pedal harp simulator. Set the seven
          pedals (D, C, B on the left foot; E, F, G, A on the right foot) to any
          position, choose from hundreds of scale and chord presets, and play
          scales, arpeggios, chords, and glissandi or tap strings live, all with
          sampled concert harp audio. Pick from several playing techniques,
          including plucked tone, harmonics, près de la table, nail, xylophonic,
          and étouffé. Built for harpists, harp teachers, students, composers,
          or anyone curious how pedal settings translate into playable music on
          a concert pedal harp.
        </p>
        <p>
          Enable JavaScript to use the interactive simulator, or visit the
          <a href="https://github.com/harpbelle/glissie">GitHub repository</a>
          for source code and documentation.
        </p>
